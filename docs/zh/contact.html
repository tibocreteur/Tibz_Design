            <div class="coordonnee" data-aos="fade-up">

                <div class=presentationpersonne>
                    <h2>Tibo Creteur</h2>

                    <p>07.83.78.48.72</p>

            <div class="contact-container" data-aos="fade-up">
                <!-- logo caché tu peu le remettre ;) -->
                <img class="logocontact" src="./../public/image/logo/logon.png" style="display: none;"
                    alt="logo du site">
                <h1 class="contact-title">联系</h1>
                <p id="contact-success" class="contact-success" style="display:none;">谢谢！您的留言已成功发送，我会尽快回复您。</p>
                <form id="contact-form" action="/api/contact" method="POST">
                    <input id="casedemig" name="lastname" type="text" placeholder="姓氏" required
                        class="contact-input" />
                    <input id="casedemid" name="firstname" type="text" placeholder="名字" required
                        class="contact-input" />
                    <input name="email" type="email" placeholder="Email" required class="contact-input"
                        autocomplete="family-name" />
                    <input name="project" type="text" placeholder="项目" class="contact-input"
                        autocomplete="given-name" />
                    <textarea name="message" rows="5" placeholder="跟我聊聊你的想法……" required
                        class="contact-textarea"></textarea>

                    <div class="cf-turnstile contact-captcha" data-sitekey="0x4AAAAAAD4JVYiSkod3az52"
                        data-theme="light" data-size="flexible"></div>

                    <input type="hidden" name="_lang" value="zh">

                    <button type="submit" class="contact-button">发送<i
                            class="fa-solid fa-paper-plane"></i></button>

                </form>
                <p class="mentioncontact">提交此表单即表示，我同意我的信息将被用于此次联系请求。</p>
                <script>
                    if (new URLSearchParams(location.search).get('sent') === 'true') {
                        document.getElementById('contact-form').style.display = 'none';
                        document.getElementById('contact-success').style.display = 'block';
                    }
                </script>
            </div>

<script>
    let prevScrollPos = window.pageYOffset;

    window.onscroll = function () {
        let currentScrollPos = window.pageYOffset;

        if (prevScrollPos < currentScrollPos) {
            document.getElementById("navbar").classList.add("navbar-hidden");
        } else {
            document.getElementById("navbar").classList.remove("navbar-hidden");
        }

        prevScrollPos = currentScrollPos;
    };
</script>
